name: Build WindUI (Pull Request)

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

jobs:
    build-pr:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: write

        steps:
            - name: Checkout PR code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 18

            - name: Install dependencies
              run: npm install

            - name: Setup Lua
              uses: leafo/gh-actions-lua@v11
              with:
                  luaVersion: "5.1"

            - name: Setup Aftman
              uses: ok-nick/setup-aftman@v0.3.0

            - name: Install Rojo, Lune and DarkLua
              run: aftman install

            - name: Run build
              id: build
              continue-on-error: true
              run: |
                  npm run build 2>&1 | tee build.log
                  echo "status=$?" >> $GITHUB_OUTPUT

            - name: Check main_example.lua and determine source
              if: steps.build.outputs.status == '0'
              id: check_example
              run: |
                  EXAMPLE_FILE="main_example.lua"

                  if [ ! -f "$EXAMPLE_FILE" ]; then
                    echo "file_exists=false" >> $GITHUB_OUTPUT
                    echo "using_main_client=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  LINE_COUNT=$(wc -l < "$EXAMPLE_FILE")
                  echo "line_count=$LINE_COUNT" >> $GITHUB_OUTPUT

                  if grep -q "loadstring(game:HttpGet('https://raw.githubusercontent.com/Footagesus/WindUI/refs/heads/main/main.client.lua'))()" "$EXAMPLE_FILE"; then
                    echo "file_exists=true" >> $GITHUB_OUTPUT
                    echo "using_main_client=true" >> $GITHUB_OUTPUT
                    echo "Should update with PR dist/main.lua"
                  else
                    echo "file_exists=true" >> $GITHUB_OUTPUT
                    echo "using_main_client=false" >> $GITHUB_OUTPUT
                    echo "File has different loadstring, will not modify"
                  fi

            - name: Generate loadstring for PR
              if: steps.build.outputs.status == '0' && steps.check_example.outputs.using_main_client == 'true'
              id: loadstring
              run: |
                  RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha }}/dist/main.lua"
                  echo "value=loadstring(game:HttpGet(\"$RAW_URL\"))()" >> $GITHUB_OUTPUT

            - name: Update main_example.lua with PR loadstring
              if: steps.build.outputs.status == '0' && steps.check_example.outputs.using_main_client == 'true'
              id: updated_example
              run: |
                  RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha }}/dist/main.lua"
                  LOADSTRING="loadstring(game:HttpGet(\"$RAW_URL\"))()"
                  EXAMPLE_FILE="main_example.lua"

                  LOADSTRING_ESCAPED=$(printf '%s\n' "$LOADSTRING" | sed -e 's/[\/&]/\\&/g')

                  sed -i "s|loadstring(game:HttpGet(\".*\"))()|$LOADSTRING_ESCAPED|g" "$EXAMPLE_FILE"
                  cat "$EXAMPLE_FILE" > updated_example.txt

            - name: Comment build result in PR
              if: always()
              uses: actions/github-script@v6
              with:
                  script: |
                      const fs = require("fs")
                      const prNumber = context.payload.pull_request.number
                      const buildStatus = `${{ steps.build.outputs.status }}`
                      const commitSha = context.payload.pull_request.head.sha
                      const usingMainClient = `${{ steps.check_example.outputs.using_main_client }}`

                      let body = []

                      if (buildStatus === '0') {
                        // Success
                        const loadstring = `${{ steps.loadstring.outputs.value }}`
                        const rawUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${commitSha}/dist/main.lua`
                        
                        body = [
                          "## <img src='https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/circle-check.svg' width='20' height='20' align='center' /> Build Successful",
                          "",
                          `<sub>Built from commit <code>${commitSha.substring(0, 7)}</code></sub>`,
                          "",
                          "---",
                          ""
                        ]
                        
                        if (usingMainClient === 'true') {
                          body.push(
                            "<details>",
                            "<summary><img src='https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/code.svg' width='16' height='16' align='center' /> <strong>Loadstring</strong></summary>",
                            "",
                            "```lua",
                            loadstring,
                            "```",
                            "",
                            "</details>",
                            "",
                            "<details>",
                            "<summary><img src='https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/file-code.svg' width='16' height='16' align='center' /> <strong>Built File</strong></summary>",
                            "",
                            `Raw build: [dist/main.lua](${rawUrl})`,
                            "",
                            "</details>"
                          )
                        } else {
                          body.push(
                            "ℹ️ <strong>main_example.lua</strong> uses a custom loadstring and was not modified."
                          )
                        }
                      } else {
                        // Failure
                        let buildLog = ''
                        try {
                          buildLog = fs.readFileSync("build.log", "utf8")
                          // Limit log size
                          if (buildLog.length > 5000) {
                            buildLog = buildLog.substring(buildLog.length - 5000)
                            buildLog = "...(truncated)\n" + buildLog
                          }
                        } catch (e) {
                          buildLog = "Could not read build log"
                        }
                        
                        body = [
                          "## <img src='https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/circle-x.svg' width='20' height='20' align='center' /> Build Failed",
                          "",
                          `<sub>Failed at commit <code>${commitSha.substring(0, 7)}</code></sub>`,
                          "",
                          "---",
                          "",
                          "<details open>",
                          "<summary><img src='https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/alert-triangle.svg' width='16' height='16' align='center' /> <strong>Build Error Log</strong></summary>",
                          "",
                          "```",
                          buildLog,
                          "```",
                          "",
                          "</details>"
                        ]
                      }

                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                        body: body.join("\n")
                      })
